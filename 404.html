<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#07090E" />
<meta name="color-scheme" content="dark" />
<meta name="robots" content="noindex, follow" />
<title>404 — Not Found · Victor Citroën</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#07090E;--text:#E8EBF0;--text-3:#6B7480;--accent:#3D7DFF;--accent-2:#6FA2FF;--line:rgba(255,255,255,.16)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:"IBM Plex Sans",system-ui,sans-serif;min-height:100vh;display:grid;place-items:center;text-align:center;padding:30px}
  .code{font-family:"IBM Plex Mono",monospace;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent-2)}
  h1{font-size:clamp(64px,16vw,180px);font-weight:600;letter-spacing:-.04em;line-height:.95;margin:18px 0 10px}
  p{color:var(--text-3);font-family:"IBM Plex Mono",monospace;font-size:14px;margin-bottom:30px}
  a{display:inline-flex;align-items:center;gap:10px;font-family:"IBM Plex Mono",monospace;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--text);text-decoration:none;border:1px solid var(--line);padding:13px 24px;transition:background .2s,border-color .2s}
  a:hover{background:var(--accent);border-color:var(--accent);color:#fff}
</style>
</head>
<body>
  <div>
    <div class="code">Error 404</div>
    <h1>404</h1>
    <p>This page could not be found.</p>
    <a href="/">← Back to victorcitroen.com</a>
  </div>
</body>
</html>
